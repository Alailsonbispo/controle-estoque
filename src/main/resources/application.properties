# Nome da aplicação
spring.application.name=controle-estoque

# Conexão com o Docker (o localhost deve ser o IP da sua máquina se houver erro, mas tente localhost primeiro)
spring.datasource.url=jdbc:postgresql://localhost:5432/estoque_db
spring.datasource.username=admin
spring.datasource.password=password123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
server.servlet.encoding.char-set=UTF-8
server.servlet.encoding.force=true